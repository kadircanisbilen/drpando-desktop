name: Build & Release desktop installers

# Push a version tag to build both installers and attach them to a GitHub
# Release:   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # also runnable manually from the Actions tab

permissions:
  contents: write # needed to create/upload the GitHub Release

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest # builds the .dmg (arm64 + x64)
          - os: windows-latest # builds the .exe (NSIS installer)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # macOS: signed with Developer ID + notarized (env from repo secrets).
      # Notarization runs automatically because APPLE_* are set and the app is
      # hardenedRuntime-signed. Kept separate from Windows so the mac cert never
      # leaks into the Windows job.
      - name: Build & publish (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish always

      # Windows: unsigned for now (first-run SmartScreen warning until a paid
      # code-signing cert is added). No signing env so nothing to leak.
      - name: Build & publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

  # After BOTH installers are uploaded to the (draft) release, flip it to public
  # and mark it "latest" — so the stable releases/latest/download/* links serve
  # it. Runs only on tag builds, only once both build jobs succeed.
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest --repo "${{ github.repository }}"
