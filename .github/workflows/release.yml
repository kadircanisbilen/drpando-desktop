name: Build & Release desktop installers

# Push a version tag to build both installers and attach them to a GitHub
# Release:   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # also runnable manually from the Actions tab

permissions:
  contents: write # needed to create/upload the GitHub Release

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest # builds the .dmg (arm64 + x64)
          - os: windows-latest # builds the .exe (NSIS installer)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned builds for now (works on both OSes; Gatekeeper/SmartScreen
          # show a first-run warning on OTHER machines). To ship a notarized
          # macOS .dmg later: add the MAC_CSC_LINK / MAC_CSC_KEY_PASSWORD /
          # APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID repo secrets,
          # map them to the matching CSC_LINK / CSC_KEY_PASSWORD / APPLE_* env
          # vars here, and remove the CSC_IDENTITY_AUTO_DISCOVERY line below.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --publish always
